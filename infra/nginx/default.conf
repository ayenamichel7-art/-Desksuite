server {
    listen 80;
    server_name ~^(?<tenant>.+)\.desksuite\.localhost$ desksuite.localhost localhost 127.0.0.1;

    # Restore Real IP from Cloudflare
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/12;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # --- Gzip Compression ---
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # --- Headers de sécurité ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "origin-when-cross-origin" always;
    # add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: 'unsafe-inline' 'unsafe-eval';" always;

    # --- DNS Resolver for Docker ---
    resolver 127.0.0.11 valid=30s;

    # --- API (Laravel Octane) ---
    location /api {
        set $upstream_laravel http://laravel:8000;
        proxy_pass $upstream_laravel;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for long-running Octane tasks
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # --- Storage MinIO (S3 Public Proxy) ---
    location /storage {
        set $upstream_minio http://minio:9000;
        proxy_pass $upstream_minio;
        proxy_set_header Host $host;
        proxy_cache_valid 200 24h;
        expires max;
        add_header Cache-Control "public, no-transform";
    }

    # --- Reverb (WebSockets) ---
    location /app/ {
        set $upstream_reverb http://reverb:8080;
        proxy_pass $upstream_reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # --- Frontend React (Vite / Dev Server) ---
    location / {
        set $upstream_react http://react:5173;
        proxy_pass $upstream_react;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # SPA Routing support (for production if serving directly)
        # try_files $uri $uri/ /index.html;
    }
}
